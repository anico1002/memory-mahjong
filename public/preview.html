<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Mahjong — Mobile Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .phone {
    position: relative;
    width: 390px;
    height: 844px;
    border-radius: 50px;
    background: #000;
    padding: 14px;
    box-shadow:
      0 0 0 2px #333,
      0 0 0 4px #1a1a1a,
      0 30px 80px rgba(0,0,0,0.6);
  }
  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 38px;
    overflow: hidden;
    background: #0a6b2a;
  }
  .screen::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }
  .screen iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .label {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: #666;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.8;
  }
  .label a { color: #888; text-decoration: none; }
  .label a:hover { color: #bbb; }
</style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <iframe src="/" title="Memory Mahjong"></iframe>
    </div>
  </div>
  <p class="label">
    Memory Mahjong — iPhone 14 preview<br>
    <a href="/onepager-es.html">Concepto (ES)</a> · <a href="/onepager-en.html">Concept (EN)</a>
  </p>
</body>
</html>
